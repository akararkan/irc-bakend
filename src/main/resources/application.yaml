# ═══════════════════════════════════════════════════════════════════════════════
#  IRC PLATFORM — APPLICATION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

spring:

  application:
    name: irc

  # ── Database ──────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/irc
    username: ${DB_USERNAME:khi}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ───────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: true
    show-sql: true
    defer-datasource-initialization: true

  # ── SQL init (runs schema.sql AFTER Hibernate DDL) ──────────────────────────
  sql:
    init:
      mode: always
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

        # ✅ PERFORMANCE OPTIMIZATION (MERGED)
        jdbc:
          batch_size: 30
          fetch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 20
        query:
          in_clause_parameter_padding: true

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  # ── OAuth2 Client ─────────────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ── RabbitMQ ──────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms
        default-requeue-rejected: false
        prefetch: 10
        concurrency: 2
        max-concurrency: 5
    template:
      mandatory: true

  # ── Jackson ───────────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

  # ── File Upload ───────────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  # ── MVC ───────────────────────────────────────────────────────────────────────
  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false


